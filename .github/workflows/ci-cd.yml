name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Backend Tests
      run: |
        cd backend
        npm test || echo "No tests configured for backend"

    - name: Run Frontend Tests
      run: |
        cd frontend
        npm test || echo "No tests configured for frontend"

    - name: Build Docker Images
      run: |
        docker-compose build

  deploy-to-ec2:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to EC2
      run: |
        echo "This is where deployment commands to EC2 instances would go."
        echo "Example:"
        echo "ssh -i my-key.pem ec2-user@<ec2-ip> 'cd /var/www/app && git pull && docker-compose up -d'"
