name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Backend Tests
      run: |
        cd backend
        npm test || echo "No tests configured for backend"

    - name: Run Frontend Tests
      run: |
        cd frontend
        npm test || echo "No tests configured for frontend"

    - name: Build Docker Images
      run: |
        docker compose build

  deploy-testing:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Deploy to testing on any branch push or pull request
    if: always() && needs.build-and-test.result == 'success'

    steps:
    - uses: actions/checkout@v3

    - name: Copy repository contents via scp
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST_TESTING }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "."
        target: "~/app"

    - name: Deploy to Testing EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST_TESTING }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app
          sudo docker compose down
          sudo docker compose up -d --build

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Deploy to staging only on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Copy repository contents via scp
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST_STAGING }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "."
        target: "~/app"

    - name: Deploy to Staging EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST_STAGING }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app
          sudo docker compose down
          sudo docker compose up -d --build
