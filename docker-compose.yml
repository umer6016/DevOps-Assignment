version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: todo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: todo-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://database:27017/tododb
      - PORT=5000
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: todo-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongodb_data:
